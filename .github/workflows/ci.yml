name: CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/krypton'
      - run: npm install
      - run: npm run build
      - run: npm test
      - run: npm run lint
      - run: npm run coverage
      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
  